[recipes.execution]
preface = """
Plan mode is part of execution mode for this project.
Before acting, state a concise plan, then execute read-only analysis unless the user explicitly approved writes.
Preserve secrets, avoid dumping tokens, and summarize with concrete file paths and next actions.
"""

[recipes.summarize-ultracode]
description = "Read-only summary of the Desktop ultracode-launcher project."
prompt = """
{execution_preface}

Task:
Summarize this project:
{ultracode_launcher_dir}

Focus on:
- what the launcher does
- important start/control scripts
- logging helpers and log layout
- OneDrive, Python, and PowerShell helper patterns worth reusing
- latest obvious risks or maintenance items
- what should be copied into personal-assistant patterns
"""

[recipes.latest-openclaw-errors]
description = "Ask OpenClaw to inspect its latest local logs/session files and explain errors."
prompt = """
{execution_preface}

Task:
Inspect OpenClaw local logs and session-related state under:
{user_openclaw_dir}

Also consider project setup notes under:
{openclaw_project_dir}

Return:
- latest ERROR/WARN/failure lines by file
- probable cause
- whether this blocks local onboarding
- exact next command to try

Do not expose tokens, auth state contents, or credentials.
"""

[recipes.latest-pa-errors]
description = "Ask OpenClaw to inspect personal-assistant logs and explain recent errors."
prompt = """
{execution_preface}

Task:
Inspect personal-assistant logs under:
{logs_dir}

Return latest warnings/errors, likely causes, and next fixes.
Do not expose secrets or private message bodies.
"""

[recipes.handoff]
description = "Summarize current repo state and remaining work for a fresh chat."
prompt = """
{execution_preface}

Task:
Create a concise handoff summary for this repo:
{project_root}

Use CHECKPOINT.md, PLAN.md, LOCAL-SETUP.md, and openclaw/config-notes.md.
Include done, remaining work, risks, and immediate next commands.
"""

[recipes.daily-brief]
description = "Create a local project brief from checkpoint, logs, and pending mobile commands."
prompt = """
{execution_preface}

Task:
Create a daily brief for the personal assistant setup.

Use:
- {checkpoint_file}
- {project_root}/PLAN.md
- {logs_dir}
- {mobile_dir}

Return:
- current setup status
- pending commands
- blockers
- recommended next 3 actions
"""

[recipes.jar-context]
description = "Summarize the jar context docs that are currently active in the IDE."
prompt = """
{execution_preface}

Task:
Summarize assistant-relevant context from:
{jar_dir}

Start with:
- reverse-engineering-memory-context.md
- CONTEXT.md

Return only durable project context and recommendations for personal-assistant memory.
"""
